# Allowances for tokens typos misreads as misspellings.
[default.extend-words]
# ID3v2 frame identifiers (TPE1/TPE2 = artist frames, TPOS = disc number) — not typos.
TPE = "TPE"
TPOS = "TPOS"
# MP4 atom "©nam" (title): the "nam" token is not a misspelling of "name".
nam = "nam"
# Audio-domain past tense of "seek" (seek to position) — correct terminology.
seeked = "seeked"
# "Yoru" (夜 = night) is a Japanese romanization used in track/song titles, not a misspelling of "Your".
Yoru = "Yoru"
