# Dev tools for Olivier, managed by mise (https://mise.jdx.dev).
# Run `mise install` to install pinned tools, then `mise exec -- <tool>` (or rely
# on mise shell activation in this directory) to use them.
#
# Rust (rustup) and Flutter (snap) are managed outside mise; this file pins the
# cargo-installed CLI tools the build needs.

[tools]
flutter = "3.44.4"
# ninja is required by Flutter's Linux desktop (CMake) build. The system has no
# ninja-build installed (snap Flutter used to bundle its own); pin it here.
ninja = "1.13.2"
# Prebuilt binary from GitHub releases (no from-source compile).
"github:fzyzcjy/flutter_rust_bridge" = { version = "2.12.0", exe = "flutter_rust_bridge_codegen" }

# Linting & tidying, orchestrated by precious (https://github.com/houseabsolute/precious).
"github:houseabsolute/precious" = "0.10.2"
"github:houseabsolute/omegasort" = "0.1.3"
node = "24.14.0"
"npm:prettier" = "3.8.1"
shellcheck = "0.11.0"
shfmt = "3.13.0"
taplo = "0.10.0"
typos = "1.44.0"
# Packaging: builds the .deb and .rpm release artifacts (see packaging/nfpm.yaml).
nfpm = "2.47.0"
