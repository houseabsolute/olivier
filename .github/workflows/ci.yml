name: CI
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # precious runs clippy + rustfmt, so the Rust toolchain is needed here.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # mise-action installs precious + flutter/dart + prettier/taplo/typos/shellcheck/shfmt/omegasort.
      - uses: jdx/mise-action@v4
      # precious's flutter-analyze needs resolved packages.
      - run: mise exec -- flutter pub get
      - run: mise exec -- precious lint --all

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # rust-toolchain is required by `flutter build linux`: cargokit invokes `cargo`.
      - uses: dtolnay/rust-toolchain@stable
      - uses: jdx/mise-action@v4
      - name: System libraries for Flutter Linux desktop
        run: |
          sudo apt-get update
          # libstdc++-14-dev is REQUIRED, not optional: Flutter forces clang for the
          # Linux build, clang auto-selects gcc-14 on Ubuntu 24.04, and without the
          # gcc-14 libstdc++ the C++ compiler test fails ("cannot find -lstdc++").
          # Do not remove it. (ninja comes from mise, not apt.)
          sudo apt-get install -y clang cmake pkg-config libgtk-3-dev liblzma-dev libstdc++-14-dev libmpv-dev xvfb
      - run: mise exec -- flutter pub get
      - run: mise exec -- flutter test
      - run: mise exec -- flutter build linux --debug
      # FFI bridge round-trips: run each integration test headless on the linux device
      # (plain `flutter test` skips integration_test/). One invocation per file —
      # `flutter test integration_test/ -d linux` launches the app once per file and the
      # second launch fails, so run them separately.
      - run: xvfb-run -a mise exec -- flutter test integration_test/tags_ffi_test.dart -d linux
      - run: xvfb-run -a mise exec -- flutter test integration_test/catalog_ffi_test.dart -d linux
